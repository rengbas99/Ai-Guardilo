<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Guardrail</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🛡️ AI Guardrail</h1>
      <p class="subtitle">PII Detection & Protection</p>
    </header>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-value" id="today-count">0</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="total-count">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>

    <div class="recent-risks">
      <h2>Recent Risks</h2>
      <div id="risks-list" class="risks-list">
        <p class="empty-state">No risks detected yet</p>
      </div>
    </div>

    <div class="actions">
      <button id="export-btn" class="btn btn-primary">Export DSAR CSV</button>
      <button id="clear-btn" class="btn btn-secondary">Clear Logs</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
